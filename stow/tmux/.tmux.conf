# ----------------------------
# Tmux config — Omarchy dev
# ----------------------------

# Prefix key: Ctrl+a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Alt+arrow
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up resize-pane -U 5
bind -n M-Down resize-pane -D 5

# Enable mouse support
set -g mouse on

# Status bar
set -g status-bg black
set -g status-fg white
set -g status-left-length 40
set -g status-right-length 100
set -g status-left "#[fg=green]#S"        # Session name
set -g status-right "#[fg=yellow]%Y-%m-%d #[fg=cyan]%H:%M:%S"

# Highlight active pane
setw -g pane-border-status top
setw -g pane-border-style fg=grey
setw -g pane-active-border-style fg=green

# Easy split navigation
bind | split-window -h
bind - split-window -v
bind x kill-pane

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Tmux config reloaded!"

# Startup window layout
new-session -s main -n editor -d
split-window -h
select-pane -t 0
