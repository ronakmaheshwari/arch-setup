source = ~/.config/omarchy/current/theme/hyprlock.conf
 
general {
    ignore_empty_input = true
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Profie-Photo
image {
    monitor =
    path = ~/.config/hypr/spidercat.jpeg
    border_size = 2
    border_color = rgba(255, 255, 255, 0)
    size = 180
    rounding = 10
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, 40
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 25
    font_family = SF Pro Display Bold
    position = 0, 350
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = rgba(216, 222, 233, 0.70)
    font_size = 120
    font_family = SF Pro Display Bold
    position = 0, 250
    halign = center
    valign = center
}

animations {
    enabled = true
}

# USER BOX (background behind username)
shape {
    monitor =
    size = 300, 60
    color = rgba(255, 255, 255, 0.1)
    rounding = 5
    border_size = 0
    border_color = rgba(253, 198, 135, 0)
    rotate = 0
    xray = false

    position = 0, -100
    halign = center
    valign = center
}

# USER LABEL (centered inside shape)
label {
    monitor =
    text =   $USER
    color = rgba(216, 222, 233, 0.80)
    outline_thickness = 2
    font_size = 18
    font_family = "JetBrainsMono Nerd Font"

    position = 0, -100
    halign = center
    valign = center
}

# INPUT FIELD (centered below user box)
input-field {
    monitor =
    size = 300, 60

    position = 0, -180
    halign = center
    valign = center

    inner_color = rgba(255, 255, 255, 0.1)
    outer_color = $outer_color
    outline_thickness = 2
    shadow_passes = 2

    # Glow on focus
    outer_color_focus = rgba(120, 180, 255, 0.85)
    outline_thickness_focus = 3

    # Animated dots
    dots_size = 0.22
    dots_spacing = 0.18
    dots_center = true
    dots_fade_time = 200
    dots_fade_delay = 80

    font_family = "JetBrainsMono Nerd Font"
    font_color = $font_color

    placeholder_text = Enter Your Password
    check_color = $check_color
    fail_text = <i>$FAILED ($ATTEMPTS)</i>

    rounding = 5
    shadow_passes = 0
    fade_on_empty = false
}

auth {
    fingerprint:enabled = true
}
